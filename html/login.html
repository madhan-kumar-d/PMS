<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MediCare HMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1a6fb5','primary-dark':'#135292','primary-light':'#e8f2fb',accent:'#0eb199'}}}}</script>
</head>
<body class="min-h-screen flex bg-gradient-to-br from-slate-900 via-blue-950 to-teal-900 items-center justify-center p-5">

  <div class="flex w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl">

    <!-- Form Side -->
    <div class="w-full bg-white flex flex-col justify-center p-10">
      <h2 class="text-2xl font-bold text-slate-800 mb-1">Welcome back</h2>
      <p class="text-slate-500 text-sm mb-8">Sign in to access your dashboard</p>

      <!-- Error -->
      <div id="errorMsg" class="hidden mb-4 px-4 py-3 bg-red-50 text-red-700 rounded-lg text-sm border border-red-200">
        ⚠️ Invalid email or password. Please try again.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Email Address</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📧</span>
            <input type="email" id="emailInput" placeholder="you@hospital.com" required
              class="w-full pl-9 pr-3 py-2.5 border border-slate-200 rounded-lg text-sm bg-slate-50 focus:outline-none focus:border-blue-500 focus:bg-white transition" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔑</span>
            <input type="password" id="passInput" placeholder="••••••••" required
              class="w-full pl-9 pr-10 py-2.5 border border-slate-200 rounded-lg text-sm bg-slate-50 focus:outline-none focus:border-blue-500 focus:bg-white transition" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400" onclick="togglePass()" id="eyeToggle">👁️</span>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-600">
            <input type="checkbox" id="remember" class="accent-blue-700" /> Remember me
          </label>
          <span class="text-sm text-blue-700 font-semibold cursor-pointer hover:underline">Forgot password?</span>
        </div>
        <button type="submit" class="w-full py-2.5 bg-blue-700 text-white rounded-lg text-sm font-semibold hover:bg-blue-800 transition">
          🔐 Sign In
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-5">Need an account? <b>Contact your administrator</b></p>

      <!-- Demo hint -->
      <div class="mt-6 p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300">
        <p class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Demo Credentials</p>
        <p class="text-xs text-slate-600">📧 admin@medicare.com</p>
        <p class="text-xs text-slate-600">🔑 admin123</p>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = 'super_admin';

    function selectRole(el, role) {
      selectedRole = role;
      document.querySelectorAll('.role-opt').forEach(opt => {
        opt.classList.remove('border-blue-700','bg-blue-50','text-blue-700');
        opt.classList.add('border-slate-200','text-slate-500');
      });
      el.classList.remove('border-slate-200','text-slate-500');
      el.classList.add('border-blue-700','bg-blue-50','text-blue-700');
    }

    function togglePass() {
      const inp = document.getElementById('passInput');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const pass  = document.getElementById('passInput').value;
      const errEl = document.getElementById('errorMsg');
      if (email && pass.length >= 4) {
        errEl.classList.add('hidden');
        window.location.href = selectedRole === 'patient' ? 'booking.html' : 'dashboard.html';
      } else {
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
